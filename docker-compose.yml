services:

  mongo:
    image: mongo:4.4
    networks:
      - acheronet
    restart: unless-stopped

  caronte:
    image: ghcr.io/eciavatta/caronte:latest
    ports:
      - "3333:3333"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    depends_on:
      - mongo
    networks:
      - acheronet
    restart: unless-stopped

  traffic_capture:
    build:
      dockerfile: Dockerfile
    environment:
      # vm_init.sh config
      FLAG_FORMAT: "[A-Z0-9]{31}="
      USER: "root"
      PASS: "72a39b1f52e8992109ef2c9fd38db05a"
      HOST: "10.60.58.1"

      # pcapper.sh config
      IFACE: "game"
      OUTDIR: "/tmp/game_pcaps"
      INTERVAL: "10"
    networks:
      - acheronet
    depends_on:
      - caronte

networks:
  acheronet:

